<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PGINHS Student Login / Sign Up</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
/* Body with dark blue top-right fading to golden yellow */
body { 
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex; 
  justify-content: center; 
  align-items: center; 
  background: radial-gradient(circle at top right, #0a1f44, #FFD700);
  overflow: hidden;
  position: relative;
}

/* Container styling with lighter gradient */
.container { 
  position: relative;
  z-index: 1;
  background: linear-gradient(135deg, #fef7d4, #fff8a5); /* light warm gradient */
  padding: 50px 30px; 
  border-radius: 20px; 
  box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
  width: 100%;
  max-width: 420px;
  text-align: center;
  color: #0a1f44; 
  box-sizing: border-box;
}

/* Title */
h2 { 
  margin-bottom: 30px; 
  font-size: 30px; 
  font-weight: bold; 
}

/* Inputs & Buttons */
input, button { 
  width: 100%; 
  padding: 16px; 
  margin: 12px 0; 
  border-radius: 10px; 
  border: none; 
  box-sizing: border-box; 
  font-size: 18px;
}

input { 
  background: rgba(255,255,255,0.9); 
  color: #0a1f44; 
  text-align: center;
}

/* Light yellow buttons */
button { 
  background: #fff59d; /* soft light yellow */
  color: #0a1f44; 
  cursor: pointer; 
  transition: all 0.2s ease; 
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

button:hover { 
  background: #ffe066; /* slightly darker on hover */
  transform: translateY(-2px);
}

/* Toggle link */
.switch { 
  text-align: center; 
  margin-top: 20px; 
  cursor: pointer; 
  color: #0a1f44; 
  font-weight: bold; 
}
.switch:hover { 
  text-decoration: underline; 
}

/* Mobile responsiveness */
@media screen and (max-width: 400px){
  .container { padding: 40px 20px; }
  input, button { padding: 14px; font-size: 16px; }
  h2 { font-size: 26px; }
}
</style>
</head>
<body>

<div class="container" id="authContainer">
  <h2 id="formTitle">Student Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="actionButton">Login</button>
  <p class="switch" id="toggleForm">Don't have an account? Sign Up</p>
</div>

<script>
// Firebase setup
const firebaseConfig = {
  apiKey: "AIzaSyAal-tUtavmqhKDGfY5ETXTanvBoieN304",
  authDomain: "student-document-request-4cd93.firebaseapp.com",
  projectId: "student-document-request-4cd93",
  storageBucket: "student-document-request-4cd93.firebasestorage.app",
  messagingSenderId: "646537888403",
  appId: "1:646537888403:web:b9c8826a2ae92f073f4366",
  measurementId: "G-TQQ8779L4G"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let formState = "login";
const formTitle = document.getElementById("formTitle");
const actionButton = document.getElementById("actionButton");
const toggleForm = document.getElementById("toggleForm");

// Toggle between login and signup
toggleForm.addEventListener("click", () => {
  if(formState === "login"){
    formState = "signup";
    formTitle.innerText = "Student Sign Up";
    actionButton.innerText = "Sign Up";
    toggleForm.innerText = "Already have an account? Login";
  } else {
    formState = "login";
    formTitle.innerText = "Student Login";
    actionButton.innerText = "Login";
    toggleForm.innerText = "Don't have an account? Sign Up";
  }
});

// Generate a tracking number
function generateTrackingNumber() {
  const randomDigits = Math.floor(1000 + Math.random() * 9000);
  const year = new Date().getFullYear();
  return `PG-${year}-${randomDigits}`;
}

// Handle login/signup
actionButton.addEventListener("click", () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(formState === "login"){
    auth.signInWithEmailAndPassword(email, password)
    .then(async userCredential => {
      const user = userCredential.user;
      const doc = await db.collection("users").doc(user.uid).get();
      if(doc.exists){
        const trackingNumber = doc.data().trackingNumber;
        alert(`Login Successful! Your tracking number: ${trackingNumber}`);
      } else {
        alert("Login Successful!");
      }
      window.location.href = "https://pginhsrequest.github.io/student-profile/";
    })
    .catch(error => {
      alert("Login Failed: " + error.message);
    });
  } else {
    auth.createUserWithEmailAndPassword(email, password)
    .then(async userCredential => {
      const user = userCredential.user;
      const trackingNumber = generateTrackingNumber();
      await db.collection("users").doc(user.uid).set({
        email: email,
        trackingNumber: trackingNumber,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      alert(`Account Created! Your tracking number is: ${trackingNumber}`);
      auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        window.location.href = "https://pginhsrequest.github.io/student-profile/";
      });
    })
    .catch(error => {
      alert("Sign Up Failed: " + error.message);
    });
  }
});
</script>
</body>
</html>
