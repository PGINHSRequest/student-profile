<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Profile</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a1f44; /* dark blue background */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  padding: 10px;
}

.profile-container {
  background: linear-gradient(135deg, #89cfff, #fff47f); /* same gradient as login box */
  padding: 50px 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  width: 100%;
  max-width: 420px;
  text-align: center;
  box-sizing: border-box;
  color: #0a1f44;
}

.profile-title {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 20px;
}

.profile-pic {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 20px;
  border: 3px solid #0a1f44;
}

h2, p {
  margin: 10px 0;
  color: #0a1f44;
}

input[type="text"] {
  width: 100%;
  padding: 16px;
  margin: 12px 0;
  border-radius: 10px;
  border: none;
  box-sizing: border-box;
  font-size: 18px;
  background: rgba(255,255,255,0.9);
  color: #0a1f44;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  background: #0a1f44;
  color: #fff;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.3s;
}

button:hover {
  background: #00214d;
}

@media screen and (max-width: 400px){
  .profile-container { padding: 40px 20px; }
  input, button { padding: 14px; font-size: 16px; }
  .profile-title { font-size: 26px; }
}
</style>
</head>

<body>

<div class="profile-container">
  <div class="profile-title">Student Profile</div>

  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
       id="profilePic"
       class="profile-pic"
       alt="Student Account Icon">

  <h2 id="email">Email</h2>
  <p id="tracking">Tracking Number</p>

  <input type="text" id="usernameInput" placeholder="Enter Username">

  <button id="saveUsernameBtn">Save Username</button>
  <button id="homepageBtn">Proceed to Homepage</button>
  <button id="logoutBtn">Log Out</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAal-tUtavmqhKDGfY5ETXTanvBoieN304",
  authDomain: "student-document-request-4cd93.firebaseapp.com",
  projectId: "student-document-request-4cd93",
  storageBucket: "student-document-request-4cd93.appspot.com",
  messagingSenderId: "646537888403",
  appId: "1:646537888403:web:b9c8826a2ae92f073f4366",
  measurementId: "G-TQQ8779L4G"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
let currentUser;

// Generate unique tracking number
function generateTrackingNumber() {
  const randomDigits = Math.floor(1000 + Math.random() * 9000);
  const year = new Date().getFullYear();
  return `PG-${year}-${randomDigits}`;
}

// Listen for authentication state
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = "https://pginhsrequest.github.io/login/";
    return;
  }

  currentUser = user;

  try {
    const userDocRef = db.collection("users").doc(user.uid);
    const userDoc = await userDocRef.get();
    let trackingNumber;

    if (userDoc.exists) {
      const data = userDoc.data();
      document.getElementById("email").innerText = data.email || user.email;

      if (data.trackingNumber) {
        trackingNumber = data.trackingNumber;
      } else {
        trackingNumber = generateTrackingNumber();
        await userDocRef.set({ trackingNumber: trackingNumber }, { merge: true });
      }

      document.getElementById("tracking").innerText = "Tracking: " + trackingNumber;

      if (data.username) {
        document.getElementById("usernameInput").value = data.username;
      }

    } else {
      trackingNumber = generateTrackingNumber();
      await userDocRef.set({
        email: user.email,
        trackingNumber: trackingNumber
      });
      document.getElementById("email").innerText = user.email;
      document.getElementById("tracking").innerText = "Tracking: " + trackingNumber;
    }

  } catch (error) {
    console.error("Error loading user data:", error);
    alert("Failed to load profile data.");
  }
});

// Save username to Firestore
document.getElementById("saveUsernameBtn").addEventListener("click", async () => {
  const username = document.getElementById("usernameInput").value.trim();
  if (!username) {
    alert("Please enter a username!");
    return;
  }

  try {
    await db.collection("users").doc(currentUser.uid).set(
      { username: username },
      { merge: true }
    );
    alert("Username saved successfully!");
  } catch (error) {
    alert("Error saving username: " + error.message);
  }
});

// Redirect to homepage
document.getElementById("homepageBtn").addEventListener("click", () => {
  window.location.href = "https://pginhsrequest.wordpress.com/";
});

// Log out
document.getElementById("logoutBtn").addEventListener("click", () => {
  auth.signOut().then(() => {
    window.location.href = "https://pginhsrequest.github.io/login/";
  }).catch(error => {
    alert("Error logging out: " + error.message);
  });
});
</script>

</body>
</html>
