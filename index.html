<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Profile</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
/* Body with blue gradient and starry background */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to bottom, #0a1f44, #1a3b70); /* dark to lighter blue */
  position: relative;
  overflow: hidden;
}

/* Stars as light blue dots */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: transparent;
  box-shadow:
    10px 20px #a0c4ff, 50px 80px #cce7ff, 90px 40px #a0c4ff, 130px 160px #cce7ff,
    180px 60px #a0c4ff, 220px 200px #cce7ff, 270px 90px #a0c4ff, 310px 180px #cce7ff,
    360px 40px #a0c4ff, 400px 150px #cce7ff, 450px 70px #a0c4ff, 500px 220px #cce7ff,
    550px 50px #a0c4ff, 600px 180px #cce7ff, 650px 120px #a0c4ff, 700px 200px #cce7ff,
    750px 90px #a0c4ff, 800px 170px #cce7ff;
  background-repeat: repeat;
  z-index: 0;
  opacity: 0.7;
}

/* PROFILE BOX WITH SKY BLUE → YELLOW GRADIENT */
.profile-container {
  position: relative;
  z-index: 1;
  background: linear-gradient(135deg, #87CEFA, #FFF47F); /* sky blue → yellow */
  border-radius: 20px;
  padding: 40px 30px;
  text-align: center;
  width: 370px;
  max-width: 90%;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  color: #0a1f44;
}

/* Title */
.profile-title {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* Profile picture */
.profile-pic {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 20px;
  border: 3px solid #0a1f44;
}

/* Email & tracking */
h2, p {
  margin: 10px 0;
  font-weight: bold;
}

/* Centered username input */
#usernameInput {
  width: 80%;
  padding: 12px;
  margin: 10px auto;
  display: block;
  border-radius: 10px;
  border: 1px solid #0a1f44;
  font-size: 16px;
  text-align: center;
}

/* Buttons */
button {
  width: 100%;
  padding: 12px 20px;
  margin-top: 15px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #87CEFA, #00BFFF); 
  color: #0a1f44;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: all 0.2s ease;
}

button:hover {
  background: linear-gradient(45deg, #00BFFF, #1E90FF);
  transform: translateY(-2px);
}

/* MOBILE RESPONSIVE */
@media screen and (max-width: 500px){
  .profile-container {
    width: 90%;
    padding: 30px 20px;
  }
  .profile-title {
    font-size: 24px;
  }
  .profile-pic {
    width: 100px;
    height: 100px;
  }
  #usernameInput, button {
    font-size: 15px;
    padding: 10px;
  }
}
</style>
</head>

<body>

<div class="profile-container">
  <div class="profile-title">Student Profile</div>

  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
       id="profilePic"
       class="profile-pic"
       alt="Student Account Icon">

  <h2 id="email">Email</h2>
  <p id="tracking">Tracking Number</p>

  <input type="text" id="usernameInput" placeholder="Enter Username">

  <button id="saveUsernameBtn">Save Username</button>
  <button id="homepageBtn">Proceed to Homepage</button>
  <button id="logoutBtn">Log Out</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAal-tUtavmqhKDGfY5ETXTanvBoieN304",
  authDomain: "student-document-request-4cd93.firebaseapp.com",
  projectId: "student-document-request-4cd93",
  storageBucket: "student-document-request-4cd93.appspot.com",
  messagingSenderId: "646537888403",
  appId: "1:646537888403:web:b9c8826a2ae92f073f4366",
  measurementId: "G-TQQ8779L4G"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let currentUser;

function generateTrackingNumber() {
  const randomDigits = Math.floor(1000 + Math.random() * 9000);
  const year = new Date().getFullYear();
  return `PG-${year}-${randomDigits}`;
}

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = "https://pginhsrequest.github.io/login/";
    return;
  }
  currentUser = user;

  try {
    const userDocRef = db.collection("users").doc(user.uid);
    const userDoc = await userDocRef.get();
    let trackingNumber;

    if (userDoc.exists) {
      const data = userDoc.data();
      document.getElementById("email").innerText = data.email || user.email;

      if (data.trackingNumber) trackingNumber = data.trackingNumber;
      else {
        trackingNumber = generateTrackingNumber();
        await userDocRef.set({ trackingNumber }, { merge: true });
      }

      document.getElementById("tracking").innerText = "Tracking: " + trackingNumber;
      if (data.username) document.getElementById("usernameInput").value = data.username;

    } else {
      trackingNumber = generateTrackingNumber();
      await userDocRef.set({ email: user.email, trackingNumber });
      document.getElementById("email").innerText = user.email;
      document.getElementById("tracking").innerText = "Tracking: " + trackingNumber;
    }

  } catch (error) { console.error(error); alert("Failed to load profile data."); }
});

document.getElementById("saveUsernameBtn").addEventListener("click", async () => {
  const username = document.getElementById("usernameInput").value.trim();
  if (!username) { alert("Please enter a username!"); return; }

  try {
    await db.collection("users").doc(currentUser.uid).set({ username }, { merge: true });
    alert("Username saved successfully!");
  } catch (error) { alert("Error saving username: " + error.message); }
});

document.getElementById("homepageBtn").addEventListener("click", () => {
  window.location.href = "https://pginhsrequest.wordpress.com/";
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  auth.signOut().then(() => {
    window.location.href = "https://pginhsrequest.github.io/login/";
  }).catch(error => { alert("Error logging out: " + error.message); });
});
</script>

</body>
</html>
