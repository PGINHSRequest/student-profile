<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Profile</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a1f44; /* dark blue */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  padding: 10px;
  position: relative;
  overflow: hidden;
}

/* Tech-style background with glowing nodes and circuit lines */
body::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('data:image/svg+xml;utf8,\
  <svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">\
    <circle cx="50" cy="50" r="3" fill="cyan" fill-opacity="0.2"/>\
    <circle cx="150" cy="80" r="3" fill="cyan" fill-opacity="0.2"/>\
    <circle cx="300" cy="120" r="3" fill="cyan" fill-opacity="0.2"/>\
    <circle cx="250" cy="200" r="3" fill="cyan" fill-opacity="0.2"/>\
    <line x1="50" y1="50" x2="150" y2="80" stroke="cyan" stroke-opacity="0.1" stroke-width="1"/>\
    <line x1="150" y1="80" x2="300" y2="120" stroke="cyan" stroke-opacity="0.1" stroke-width="1"/>\
    <line x1="300" y1="120" x2="250" y2="200" stroke="cyan" stroke-opacity="0.1" stroke-width="1"/>\
    <line x1="50" y1="50" x2="250" y2="200" stroke="cyan" stroke-opacity="0.05" stroke-width="1"/>\
  </svg>');
  background-repeat: repeat;
  z-index: 0;
}

.profile-container {
  position: relative;
  z-index: 1; /* above background */
  background: linear-gradient(135deg, #89cfff, #fff47f); /* login box gradient */
  padding: 50px 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  width: 100%;
  max-width: 420px;
  text-align: center;
  box-sizing: border-box;
  color: #0a1f44;
}

.profile-title {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 20px;
}

.profile-pic {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 20px;
  border: 3px solid #0a1f44;
}

h2, p {
  margin: 10px 0;
  color: #0a1f44;
}

input[type="text"] {
  width: 100%;
  padding: 16px;
  margin: 12px 0;
  border-radius: 10px;
  border: none;
  box-sizing: border-box;
  font-size: 18px;
  background: rgba(255,255,255,0.9);
  color: #0a1f44;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  background: #0a1f44;
  color: #fff;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.3s;
}

button:hover {
  background: #00214d;
}

@media screen and (max-width: 400px){
  .profile-container { padding: 40px 20px; }
  input, button { padding: 14px; font-size: 16px; }
  .profile-title { font-size: 26px; }
}
</style>
</head>

<body>

<div class="profile-container">
  <div class="profile-title">Student Profile</div>

  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
       id="profilePic"
       class="profile-pic"
       alt="Student Account Icon">

  <h2 id="email">Email</h2>
  <p id="tracking">Tracking Number</p>

  <input type="text" id="usernameInput" placeholder="Enter Username">

  <button id="saveUsernameBtn">Save Username</button>
  <button id="homepageBtn">Proceed to Homepage</button>
  <button id="logoutBtn">Log Out</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAal-tUtavmqhKDGfY5ETXTanvBoieN304",
  authDomain: "student-document-request-4cd93.firebaseapp.com",
  projectId: "student-document-request-4cd93",
  storageBucket: "student-document-request-4cd93.appspot.com",
  messagingSenderId: "646537888403",
  appId: "1:646537888403:web:b9c8826a2ae92f073f4366",
  measurementId: "G-TQQ8779L4G"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let currentUser;

function generateTrackingNumber() {
  const randomDigits = Math.floor(1000 + Math.random() * 9000);
  const year = new Date().getFullYear();
  return `PG-${year}-${randomDigits}`;
}

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = "https://pginhsrequest.github.io/login/";
    return;
  }

  currentUser = user;

  try {
    const userDocRef = db.collection("users").doc(user.uid);
    const userDoc = await userDocRef.get();
    let trackingNumber;

    if (userDoc.exists) {
      const data = userDoc.data();
      document.getElementById("email").innerText = data.email || user.email;

      if (data.trackingNumber) {
        trackingNumber = data.trackingNumber;
      } else {
        trackingNumber = generateTrackingNumber();
        await userDocRef.set({ trackingNumber: trackingNumber }, { merge: true });
      }

      document.getElementById("tracking").innerText = "Tracking: " + trackingNumber;

      if (data.username) {
        document.getElementById("usernameInput").value = data.username;
      }

    } else {
      trackingNumber = generateTrackingNumber();
      await userDocRef.set({
        email: user.email,
        trackingNumber: trackingNumber
      });
      document.getElementById("email").innerText = user.email;
      document.getElementById("tracking").innerText = "Tracking: " + trackingNumber;
    }

  } catch (error) {
    console.error("Error loading user data:", error);
    alert("Failed to load profile data.");
  }
});

document.getElementById("saveUsernameBtn").addEventListener("click", async () => {
  const username = document.getElementById("usernameInput").value.trim();
  if (!username) { alert("Please enter a username!"); return; }

  try {
    await db.collection("users").doc(currentUser.uid).set({ username: username }, { merge: true });
    alert("Username saved successfully!");
  } catch (error) { alert("Error saving username: " + error.message); }
});

document.getElementById("homepageBtn").addEventListener("click", () => {
  window.location.href = "https://pginhsrequest.wordpress.com/";
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  auth.signOut().then(() => {
    window.location.href = "https://pginhsrequest.github.io/login/";
  }).catch(error => { alert("Error logging out: " + error.message); });
});
</script>

</body>
</html>
