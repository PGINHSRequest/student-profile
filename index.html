<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Profile</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
/* Body with majestic dark blue background */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0a1f44;
    overflow: hidden;
}

/* Container wrapper to hold arch */
.wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Decorative hole / arch with dark blue inner and thicker orange border */
.wrapper::before {
    content: "";
    position: absolute;
    top: -80px;
    width: 220px;
    height: 100px;
    background: #0a1f44; /* dark blue inner */
    border-radius: 50% 50% 0 0;
    border: 6px solid #FFA500; /* thicker orange border */
    box-shadow: 0 0 15px rgba(255,165,0,0.5);
    z-index: 2;
}

/* Profile box with pastel yellow → pastel blue gradient */
.profile-container {
    background: linear-gradient(135deg, #FFF8B5, #B3D9FF);
    border-radius: 25px;
    padding: 45px 35px;
    text-align: center;
    width: 380px;
    max-width: 90%;
    box-shadow: 0 15px 35px rgba(0,0,0,0.35);
    color: #0a1f44;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
}

/* Title */
.profile-title {
    font-size: 30px;
    font-weight: bold;
    margin-bottom: 25px;
}

/* Profile picture */
.profile-pic {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 25px;
    border: 3px solid #0a1f44;
}

/* Email & tracking */
h2, p {
    margin: 12px 0;
    font-weight: bold;
    text-align: center;
    color: #0a1f44;
}

/* Username input */
#usernameInput {
    width: 90%;
    padding: 15px;
    margin: 12px auto;
    border-radius: 12px;
    border: 1px solid #0a1f44;
    font-size: 16px;
    text-align: center;
}

/* Buttons with pastel colors + thin dark blue border */
button {
    width: 90%;
    padding: 15px;
    margin-top: 15px;
    font-size: 16px;
    border: 2px solid #0a1f44; /* thin dark blue border */
    border-radius: 12px;
    background: linear-gradient(45deg, #A2D5F2, #FFF5BA); /* pastel gradient */
    color: #0a1f44;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    transition: all 0.25s ease;
}
button:hover {
    background: linear-gradient(45deg, #8AC4E9, #FFF1A8); /* slightly lighter pastel on hover */
    transform: translateY(-2px);
}

/* MOBILE RESPONSIVE ENHANCED */
@media screen and (max-width: 600px) {
    .profile-container { width: 95%; padding: 50px 25px; }
    .profile-title { font-size: 28px; }
    .profile-pic { width: 140px; height: 140px; }
    #usernameInput, button { font-size: 18px; padding: 16px; }
    h2, p { font-size: 17px; }
}
</style>
</head>
<body>

<div class="wrapper">
    <div class="profile-container">
        <div class="profile-title">Student Digital ID</div>
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" id="profilePic" class="profile-pic" alt="Student Account Icon">
        <h2 id="email">Email</h2>
        <p id="tracking">Tracking Number</p>
        <input type="text" id="usernameInput" placeholder="Enter Full Name">
        <button id="saveUsernameBtn">Save Username</button>
        <button id="homepageBtn">Proceed to Homepage</button>
        <button id="logoutBtn">Log Out</button>
    </div>
</div>

<script>
// Firebase setup
const firebaseConfig = {
  apiKey: "AIzaSyAal-tUtavmqhKDGfY5ETXTanvBoieN304",
  authDomain: "student-document-request-4cd93.firebaseapp.com",
  projectId: "student-document-request-4cd93",
  storageBucket: "student-document-request-4cd93.appspot.com",
  messagingSenderId: "646537888403",
  appId: "1:646537888403:web:b9c8826a2ae92f073f4366",
  measurementId: "G-TQQ8779L4G"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let currentUser;

function generateTrackingNumber() {
    const randomDigits = Math.floor(1000 + Math.random() * 9000);
    const year = new Date().getFullYear();
    return `PG-${year}-${randomDigits}`;
}

auth.onAuthStateChanged(async (user) => {
    if (!user) {
        window.location.href = "https://pginhsrequest.github.io/login/";
        return;
    }
    currentUser = user;
    try {
        const userDocRef = db.collection("users").doc(user.uid);
        const userDoc = await userDocRef.get();
        let trackingNumber;
        if (userDoc.exists) {
            const data = userDoc.data();
            document.getElementById("email").innerText = data.email || user.email;
            if (data.trackingNumber) trackingNumber = data.trackingNumber;
            else {
                trackingNumber = generateTrackingNumber();
                await userDocRef.set({ trackingNumber }, { merge: true });
            }
            document.getElementById("tracking").innerText = "Tracking: " + trackingNumber;
            if (data.username) document.getElementById("usernameInput").value = data.username;
        } else {
            trackingNumber = generateTrackingNumber();
            await userDocRef.set({ email: user.email, trackingNumber });
            document.getElementById("email").innerText = user.email;
            document.getElementById("tracking").innerText = "Tracking: " + trackingNumber;
        }
    } catch (error) {
        console.error(error);
        alert("Failed to load profile data.");
    }
});

document.getElementById("saveUsernameBtn").addEventListener("click", async () => {
    const username = document.getElementById("usernameInput").value.trim();
    if (!username) { alert("Please enter a username!"); return; }
    try {
        await db.collection("users").doc(currentUser.uid).set({ username }, { merge: true });
        alert("Username saved successfully!");
    } catch (error) {
        alert("Error saving username: " + error.message);
    }
});

document.getElementById("homepageBtn").addEventListener("click", () => {
    window.location.href = "https://pginhsrequest.wordpress.com/";
});

document.getElementById("logoutBtn").addEventListener("click", () => {
    auth.signOut().then(() => {
        window.location.href = "https://pginhsrequest.github.io/login/";
    }).catch(error => {
        alert("Error logging out: " + error.message);
    });
});
</script>

</body>
</html>
