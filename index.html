<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Profile</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
/* Basic reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Galaxy background */
body {
  font-family: Arial, sans-serif;
  background: radial-gradient(ellipse at bottom, #0a1f44 0%, #000018 100%);
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  position: relative;
}

/* Small stars */
body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: transparent;
  box-shadow:
    50px 100px white, 150px 200px white, 250px 50px white,
    350px 300px white, 450px 150px white, 550px 400px white,
    650px 50px white, 750px 250px white, 850px 100px white;
  z-index: 0;
}

/* Profile container */
.profile-container {
  position: relative;
  z-index: 1;
  background: linear-gradient(135deg, #1b2a6a, #243b8c);
  padding: 50px 30px;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
  width: 100%;
  max-width: 420px;
  text-align: center;
  color: #fff;
}

/* Title */
.profile-title {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 25px;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}

/* Profile picture */
.profile-pic {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 20px;
  border: 3px solid #87CEFA; /* sky blue border for effect */
}

/* Email & tracking */
h2, p {
  margin: 10px 0;
  color: #87CEFA; /* sky blue text for accent */
  font-weight: bold;
}

/* Centered username input */
#usernameInput {
  width: 80%;
  padding: 14px;
  margin: 20px auto;
  display: block;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  background: rgba(255,255,255,0.95);
  color: #0a1f44;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
  text-align: center;
}

/* Sky-blue gradient buttons */
button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg, #87CEFA, #00BFFF);
  color: #0a1f44;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  transition: all 0.2s ease;
}

button:hover {
  background: linear-gradient(45deg, #00BFFF, #1E90FF);
  transform: translateY(-2px);
}

@media screen and (max-width: 400px){
  .profile-container { padding: 40px 20px; }
  button, #usernameInput { padding: 12px; font-size: 15px; }
  .profile-title { font-size: 26px; }
}
</style>
</head>

<body>

<div class="profile-container">
  <div class="profile-title">Student Profile</div>

  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
       id="profilePic"
       class="profile-pic"
       alt="Student Account Icon">

  <h2 id="email">Email</h2>
  <p id="tracking">Tracking Number</p>

  <input type="text" id="usernameInput" placeholder="Enter Username">

  <button id="saveUsernameBtn">Save Username</button>
  <button id="homepageBtn">Proceed to Homepage</button>
  <button id="logoutBtn">Log Out</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAal-tUtavmqhKDGfY5ETXTanvBoieN304",
  authDomain: "student-document-request-4cd93.firebaseapp.com",
  projectId: "student-document-request-4cd93",
  storageBucket: "student-document-request-4cd93.appspot.com",
  messagingSenderId: "646537888403",
  appId: "1:646537888403:web:b9c8826a2ae92f073f4366",
  measurementId: "G-TQQ8779L4G"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let currentUser;

function generateTrackingNumber() {
  const randomDigits = Math.floor(1000 + Math.random() * 9000);
  const year = new Date().getFullYear();
  return `PG-${year}-${randomDigits}`;
}

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = "https://pginhsrequest.github.io/login/";
    return;
  }
  currentUser = user;

  try {
    const userDocRef = db.collection("users").doc(user.uid);
    const userDoc = await userDocRef.get();
    let trackingNumber;

    if (userDoc.exists) {
      const data = userDoc.data();
      document.getElementById("email").innerText = data.email || user.email;

      if (data.trackingNumber) trackingNumber = data.trackingNumber;
      else {
        trackingNumber = generateTrackingNumber();
        await userDocRef.set({ trackingNumber }, { merge: true });
      }

      document.getElementById("tracking").innerText = "Tracking: " + trackingNumber;
      if (data.username) document.getElementById("usernameInput").value = data.username;

    } else {
      trackingNumber = generateTrackingNumber();
      await userDocRef.set({ email: user.email, trackingNumber });
      document.getElementById("email").innerText = user.email;
      document.getElementById("tracking").innerText = "Tracking: " + trackingNumber;
    }

  } catch (error) { console.error(error); alert("Failed to load profile data."); }
});

document.getElementById("saveUsernameBtn").addEventListener("click", async () => {
  const username = document.getElementById("usernameInput").value.trim();
  if (!username) { alert("Please enter a username!"); return; }

  try {
    await db.collection("users").doc(currentUser.uid).set({ username }, { merge: true });
    alert("Username saved successfully!");
  } catch (error) { alert("Error saving username: " + error.message); }
});

document.getElementById("homepageBtn").addEventListener("click", () => {
  window.location.href = "https://pginhsrequest.wordpress.com/";
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  auth.signOut().then(() => {
    window.location.href = "https://pginhsrequest.github.io/login/";
  }).catch(error => { alert("Error logging out: " + error.message); });
});
</script>

</body>
</html>
